name: "Action Profiler"
description: "Profile GitHub Actions workflows with eBPF - process tracing, system metrics, and interactive reports"
author: "Oguzhan Ozdemir"

branding:
    icon: triangle
    color: gray-dark

inputs:
    metric_frequency:
        description: "System metrics collection interval in seconds (0 to disable)"
        default: "5"
        required: false
    proc_trace_sys_enable:
        description: "Include default system processes in trace (awk, cat, grep, etc.)"
        default: "false"
        required: false
    ignore_processes:
        description: "Comma-separated list of command names to ignore (e.g. 'node,sh')"
        required: false
    ignore_patterns:
        description: "Comma-separated list of cmdline substrings to ignore (e.g. 'vscode-server')"
        required: false
    enable_oom:
        description: "Enable OOM kill detection"
        default: "true"
        required: false
    enable_block_io:
        description: "Enable block I/O latency tracing"
        default: "true"
        required: false
    enable_sched_latency:
        description: "Enable scheduler latency tracing"
        default: "true"
        required: false
    sched_latency_threshold_ms:
        description: "Minimum scheduler latency in ms to report"
        default: "5"
        required: false
    artifact_retention_days:
        description: "Number of days to keep the report artifact"
        default: "3"
        required: false

outputs:
    artifact-id:
        description: "ID of the uploaded report artifact"
    artifact-url:
        description: "URL to download the report artifact"

runs:
    using: node24
    main: dist/main/index.js
    post: dist/post/index.js
