# Ensures the checked-in dist/, profiler/bin/profiler, and profiler/bin/out/
# match what would be produced by a clean build from source.
name: Check Build Outputs

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  check-dist:
    name: Check dist/ and profiler/bin/
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 1

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      - name: Install clang and wasm-pack
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq clang
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Remove dist/ Directory
        id: remove-dist
        run: npx rimraf ./dist

      - name: Install Dependencies
        id: install
        run: npm ci

      - name: Build
        id: build
        run: npm run bundle

      - name: Compare Build Outputs
        id: diff
        run: |
          if [ ! -d dist/ ]; then
            echo "Expected dist/ directory does not exist.  See status below:"
            ls -la ./
            exit 1
          fi
          DIFF="$(git diff --ignore-space-at-eol --text dist/ profiler/bin/ | wc -l)"
          if [ "$DIFF" -gt "0" ]; then
            echo "Detected uncommitted changes after build. See status below:"
            git diff --ignore-space-at-eol --text --stat dist/ profiler/bin/
            exit 1
          fi

      - if: ${{ failure() && steps.diff.outcome == 'failure' }}
        name: Upload Artifact
        id: upload
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/
