# Verifies that:
# 1. PR does not include compiled binaries (only updated via update-artifacts)
# 2. Checked-in dist/ and viewer assets match what would be built from source
name: Check Build Outputs

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  reject-binaries:
    name: No compiled binaries in PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check for binary changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PROTECTED=(
            "profiler/bin/profiler"
            "profiler/bin/out/pkg/profiler_viewer_bg.wasm"
          )

          CHANGED=$(gh pr diff "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" --name-only)

          FOUND=()
          for pattern in "${PROTECTED[@]}"; do
            while IFS= read -r file; do
              if [[ "$file" == ${pattern}* ]]; then
                FOUND+=("$file")
              fi
            done <<< "$CHANGED"
          done

          if [ ${#FOUND[@]} -gt 0 ]; then
            echo "::error::PR contains compiled binaries. These are updated via the update-artifacts workflow only."
            echo ""
            echo "Offending files:"
            for f in "${FOUND[@]}"; do
              echo "  - $f"
            done
            echo ""
            echo "Run 'bash scripts/dev-setup.sh' to skip-worktree these files locally."
            exit 1
          fi

          echo "No compiled binaries in PR."

  check-dist:
    name: Check build outputs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Remove dist/
        run: npx rimraf ./dist

      - name: Install Dependencies
        run: npm ci

      - name: Build (skip profiler binary)
        run: |
          bash scripts/build.sh --skip-binary
          npx rimraf ./dist
          npx rollup --config rollup.config.ts --configPlugin @rollup/plugin-typescript

      # Diff only deterministic outputs: transpiled JS, copied HTML/echarts/JS glue.
      # Compiled artifacts (binary, WASM) aren't reproducible -- the build step
      # above already verifies they compile. A separate release workflow commits them.
      - name: Compare Deterministic Outputs
        id: diff
        run: |
          if [ ! -d dist/ ]; then
            echo "Expected dist/ directory does not exist."
            ls -la ./
            exit 1
          fi
          DIFF="$(git diff --ignore-space-at-eol --text dist/ profiler/bin/out/index.html profiler/bin/out/echarts.min.js profiler/bin/out/pkg/profiler_viewer.js | wc -l)"
          if [ "$DIFF" -gt "0" ]; then
            echo "Detected uncommitted changes after build. See status below:"
            git diff --ignore-space-at-eol --text --stat dist/ profiler/bin/out/index.html profiler/bin/out/echarts.min.js profiler/bin/out/pkg/profiler_viewer.js
            exit 1
          fi

      - if: ${{ failure() && steps.diff.outcome == 'failure' }}
        name: Upload Artifact
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/
