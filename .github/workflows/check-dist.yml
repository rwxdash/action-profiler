# Verifies that:
# 1. Profiler binary and WASM viewer compile successfully
# 2. Checked-in dist/ and viewer assets match what would be built from source
name: Check Build Outputs

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  check-dist:
    name: Check build outputs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      - name: Install clang and wasm-pack
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq clang
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Remove dist/
        run: npx rimraf ./dist

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run package

      # Diff only deterministic outputs: transpiled JS, copied HTML/echarts/JS glue.
      # Compiled artifacts (binary, WASM) aren't reproducible — the build step
      # above already verifies they compile. A separate release workflow commits them.
      - name: Compare Deterministic Outputs
        id: diff
        run: |
          if [ ! -d dist/ ]; then
            echo "Expected dist/ directory does not exist."
            ls -la ./
            exit 1
          fi
          DIFF="$(git diff --ignore-space-at-eol --text dist/ profiler/bin/out/index.html profiler/bin/out/echarts.min.js profiler/bin/out/pkg/profiler_viewer.js | wc -l)"
          if [ "$DIFF" -gt "0" ]; then
            echo "Detected uncommitted changes after build. See status below:"
            git diff --ignore-space-at-eol --text --stat dist/ profiler/bin/out/index.html profiler/bin/out/echarts.min.js profiler/bin/out/pkg/profiler_viewer.js
            exit 1
          fi

      - if: ${{ failure() && steps.diff.outcome == 'failure' }}
        name: Upload Artifact
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/
