name: Kernel Debug Info
on:
  workflow_dispatch:
  push:
    branches: [impl/**]
    paths: [".github/workflows/kernel-debug.yml", "scripts/kernel-debug.sh"]

jobs:
  debug:
    strategy:
      matrix:
        runner: [ubuntu-24.04, ubuntu-22.04]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install debug tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq dwarves linux-tools-common bpftool 2>/dev/null || true
          # Try kernel-specific tools
          sudo apt-get install -y -qq "linux-tools-$(uname -r)" 2>/dev/null || true

      - name: Run kernel debug script
        run: bash scripts/kernel-debug.sh kernel-debug-${{ matrix.runner }}.txt

      - uses: actions/upload-artifact@v4
        with:
          name: kernel-debug-${{ matrix.runner }}
          path: kernel-debug-${{ matrix.runner }}.txt
          retention-days: 7
