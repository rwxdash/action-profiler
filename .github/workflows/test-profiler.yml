name: Test Profiler Action
on:
  workflow_dispatch:
  pull_request:
    branches: [master]

jobs:
  profile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install clang
        run: sudo apt-get update -qq && sudo apt-get install -y -qq clang

      - name: Build profiler
        run: |
          cd profiler && cargo build --release
          mkdir -p bin
          cp target/release/profiler bin/profiler
          chmod +x bin/profiler

      - uses: ./
        id: profiler
        with:
          metric_frequency: "5"

      # ── Workloads ─────────────────────────────────────────────────

      # OOM kill test - may not work on all runners (cgroup nesting limitations)
      - name: "OOM kill (32MB cgroup limit, delayed)"
        continue-on-error: true
        run: |
          sleep 10
          sudo systemctl reset-failed profiler-oom-test.scope 2>/dev/null || true
          sudo systemctl stop profiler-oom-test.scope 2>/dev/null || true
          sudo systemd-run --scope --unit=profiler-oom-test \
            -p MemoryMax=32M -p MemorySwapMax=0 \
            -- python3 -c "
          import mmap
          chunks = []
          while True:
              m = mmap.mmap(-1, 1048576)
              m[:] = b'x' * 1048576
              chunks.append(m)
          " 2>&1 || true
          echo "OOM test done (expected kill)"

      - name: "Block I/O (direct write + read)"
        run: |
          TESTFILE="/tmp/profiler-test-blockio"
          dd if=/dev/zero of="$TESTFILE" bs=1M count=64 oflag=direct conv=fsync 2>/dev/null
          sudo sh -c 'echo 3 > /proc/sys/vm/drop_caches' || true
          dd if="$TESTFILE" of=/dev/null bs=1M iflag=direct 2>/dev/null
          sync && rm -f "$TESTFILE"

      - name: "Scheduler pressure (CPU contention)"
        run: |
          NCPUS=$(nproc)
          NPROCS=$((NCPUS * 4))
          PIDS=()
          for i in $(seq 1 "$NPROCS"); do
            timeout 5 sh -c 'while true; do :; done' &
            PIDS+=($!)
          done
          for pid in "${PIDS[@]}"; do wait "$pid" 2>/dev/null || true; done

      - name: "Cargo check (process tree)"
        continue-on-error: true
        run: cd profiler && cargo check -p profiler-common 2>&1 | tail -5

      - name: "Short-lived processes"
        run: |
          for i in $(seq 1 20); do
            ls -la /tmp > /dev/null
            cat /proc/version > /dev/null
            date > /dev/null
          done

      - name: Drain ring buffers
        run: sleep 2

      # Post phase runs automatically here - stops profiler, uploads artifact

  validate:
    runs-on: ubuntu-latest
    needs: profile
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: action-profiler-report

      - name: Check artifact contents
        run: |
          echo "==> Artifact contents:"
          ls -lhR .

          echo ""
          echo "==> Checking required files..."
          test -f index.html && echo "  [pass] index.html"
          test -f profiler-events.jsonl && echo "  [pass] profiler-events.jsonl"

      - name: Validate JSONL events
        run: |
          FILE="profiler-events.jsonl"
          TOTAL=$(wc -l < "$FILE")
          EXEC=$(grep -c '"exec"' "$FILE" || true)
          EXIT=$(grep -c '"exit"' "$FILE" || true)
          OOM=$(grep -c '"oom_kill"' "$FILE" || true)
          BLOCKIO=$(grep -c '"block_io"' "$FILE" || true)
          SCHED=$(grep -c '"sched_latency"' "$FILE" || true)
          METRICS=$(grep -c '"metrics"' "$FILE" || true)

          printf "  %-25s %s\n" "Total lines:" "$TOTAL"
          printf "  %-25s %s\n" "exec:" "$EXEC"
          printf "  %-25s %s\n" "exit:" "$EXIT"
          printf "  %-25s %s\n" "oom_kill:" "$OOM"
          printf "  %-25s %s\n" "block_io:" "$BLOCKIO"
          printf "  %-25s %s\n" "sched_latency:" "$SCHED"
          printf "  %-25s %s\n" "metrics:" "$METRICS"

          PASS=true
          check() {
            if [ "$2" -gt 0 ]; then
              echo "  [pass] $1: $2 events"
            else
              echo "  [FAIL] $1: 0 events"
              PASS=false
            fi
          }

          echo ""
          check "exec" "$EXEC"
          check "exit" "$EXIT"
          check "block_io" "$BLOCKIO"
          check "sched_latency" "$SCHED"
          check "metrics" "$METRICS"

          # OOM is environment-dependent (cgroup config varies by runner)
          if [ "$OOM" -gt 0 ]; then
            echo "  [pass] oom_kill: $OOM events"
          else
            echo "  [warn] oom_kill: 0 events (cgroup may not have triggered kernel OOM)"
          fi

          echo ""
          if $PASS; then
            echo "All event types captured!"
          else
            echo "Some event types missing!"
            exit 1
          fi
