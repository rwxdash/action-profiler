name: Build Profiler Binaries
on:
  workflow_dispatch:
  push:
    paths: ["profiler/**"]
    branches: [master]

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            suffix: ubuntu2404
          - runner: ubuntu-22.04
            suffix: ubuntu2204
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install bpftool (prebuilt)
        run: |
          curl -fsSL https://github.com/libbpf/bpftool/releases/download/v7.6.0/bpftool-v7.6.0-amd64.tar.gz | sudo tar -xz -C /usr/local/bin/
          sudo chmod +x /usr/local/bin/bpftool
          bpftool version

      - name: Install Rust nightly + eBPF tools
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain nightly --component rust-src
          source "$HOME/.cargo/env"
          cargo install bpf-linker
          cargo install bindgen-cli
          cargo install --git https://github.com/aya-rs/aya -- aya-tool

      - name: Generate vmlinux bindings for this kernel
        run: |
          source "$HOME/.cargo/env"
          echo "Kernel: $(uname -r)"
          aya-tool generate task_struct linux_binprm > profiler/profiler-ebpf/src/vmlinux.rs
          cp profiler/profiler-ebpf/src/vmlinux.rs vmlinux_${{ matrix.suffix }}.rs

      - name: Build profiler
        run: |
          source "$HOME/.cargo/env"
          cd profiler && cargo build --release

      - name: Rename binary
        run: |
          cp profiler/target/release/profiler profiler-${{ matrix.suffix }}
          chmod +x profiler-${{ matrix.suffix }}

      - uses: actions/upload-artifact@v4
        with:
          name: profiler-${{ matrix.suffix }}
          path: |
            profiler-${{ matrix.suffix }}
            vmlinux_${{ matrix.suffix }}.rs
          retention-days: 30
