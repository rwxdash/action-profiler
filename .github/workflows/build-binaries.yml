name: Build Profiler Binaries
on:
  workflow_dispatch:
  push:
    paths: ["profiler/**"]
    branches: [master]

jobs:
  build:
    strategy:
      matrix:
        runner: [ubuntu-24.04, ubuntu-22.04]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install clang
        run: sudo apt-get update -qq && sudo apt-get install -y -qq clang

      - name: Build profiler
        run: cd profiler && cargo build --release

      - name: Prepare binary
        run: |
          cp profiler/target/release/profiler profiler-linux-amd64
          chmod +x profiler-linux-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: profiler-${{ matrix.runner }}
          path: profiler-linux-amd64
          retention-days: 30
