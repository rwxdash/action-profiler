name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Validate tag format
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '$TAG' does not match vX.Y.Z format"
            exit 1
          fi

      - name: Validate compiled artifacts
        run: |
          MISSING=()
          [ ! -f dist/main/index.js ] && MISSING+=("dist/main/index.js")
          [ ! -f dist/post/index.js ] && MISSING+=("dist/post/index.js")
          [ ! -f profiler/bin/profiler ] && MISSING+=("profiler/bin/profiler")
          [ ! -f profiler/bin/out/pkg/profiler_viewer_bg.wasm ] && MISSING+=("profiler/bin/out/pkg/profiler_viewer_bg.wasm")

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing compiled artifacts. Run update-artifacts workflow before tagging."
            for f in "${MISSING[@]}"; do
              echo "  - $f"
            done
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --generate-notes
